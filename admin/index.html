<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="mamad_dev Portfolio Admin Panel">
  <meta name="theme-color" content="#1c1917">
  <title>Admin Panel — mamad_dev</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="admin.css">
</head>
<body>

  <!-- ============================================================
       LOGIN SCREEN — shown when not authenticated
       ============================================================ -->
  <div id="loginScreen" class="login-screen">
    <div class="login__card">
      <div class="login__logo">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polygon points="12,2 22,8.5 22,15.5 12,22 2,15.5 2,8.5"/>
        </svg>
      </div>
      <h1 class="login__title">Admin Login</h1>
      <p class="login__subtitle">Enter your username and password</p>

      <form id="loginForm" novalidate>
        <div class="form__field">
          <label for="loginUser" class="form__label">Username</label>
          <input type="text" id="loginUser" name="username" class="form__input" placeholder="admin" required autocomplete="username" dir="ltr">
          <span class="form__error" id="loginUserError"></span>
        </div>
        <div class="form__field">
          <label for="loginPass" class="form__label">Password</label>
          <input type="password" id="loginPass" name="password" class="form__input" placeholder="••••••••" required autocomplete="current-password" dir="ltr">
          <span class="form__error" id="loginPassError"></span>
        </div>
        <div id="loginGlobalError" class="login__error" aria-live="polite"></div>
        <button type="submit" class="btn btn--primary btn--full" id="loginBtn">
          <span class="btn__text">Login</span>
        </button>
      </form>
    </div>
  </div>

  <!-- ============================================================
       ADMIN DASHBOARD — shown after successful login
       ============================================================ -->
  <div id="adminDashboard" class="admin-dashboard" hidden>

    <!-- Top bar -->
    <header class="admin-topbar">
      <div class="admin-topbar__inner">
        <div class="admin-topbar__brand">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polygon points="12,2 22,8.5 22,15.5 12,22 2,15.5 2,8.5"/>
          </svg>
          <span>Admin Panel</span>
        </div>
        <div class="admin-topbar__actions">
          <a href="../index.html" class="admin-topbar__link" target="_blank" rel="noopener">
            View Website
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M6 2H2v4M14 2L9 7M9 2h5v5"/>
            </svg>
          </a>
          <button class="btn btn--sm btn--outline" id="logoutBtn">
            <span>Logout</span>
          </button>
        </div>
      </div>
    </header>

    <!-- Main content -->
    <div class="admin-main">
      <div class="container">

        <!-- Tabs -->
        <div class="admin-tabs" role="tablist">
          <button class="admin-tab active" data-tab="projects" role="tab" aria-selected="true" aria-controls="tabProjects">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/>
              <rect x="1" y="9" width="6" height="6" rx="1"/><rect x="9" y="9" width="6" height="6" rx="1"/>
            </svg>
            <span>Projects</span>
          </button>
          <button class="admin-tab" data-tab="skills" role="tab" aria-selected="false" aria-controls="tabSkills">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M2 14V8l4-4 4 4 4-6"/>
            </svg>
            <span>Skills</span>
          </button>
          <button class="admin-tab" data-tab="messages" role="tab" aria-selected="false" aria-controls="tabMessages">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M14 2H2l2 9h8l2-9z"/><path d="M2 13h12"/>
            </svg>
            <span>Messages</span>
          </button>
        </div>

        <!-- ==================== PROJECTS TAB ==================== -->
        <div class="admin-panel active" id="tabProjects" role="tabpanel">
          <div class="admin-panel__header">
            <h2 class="admin-panel__title">Manage Projects</h2>
            <button class="btn btn--primary btn--sm" id="addProjectBtn">
              <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true">
                <path d="M8 2v12M2 8h12"/>
              </svg>
              <span>New Project</span>
            </button>
          </div>

          <div id="projectsList" class="projects-list">
            <!-- Project cards rendered by JS -->
          </div>
        </div>

        <!-- ==================== SKILLS TAB ==================== -->
        <div class="admin-panel" id="tabSkills" role="tabpanel" hidden>
          <div class="admin-panel__header">
            <h2 class="admin-panel__title">Manage Skills</h2>
          </div>

          <div id="skillsList" class="skills-list">
            <!-- Skill rows rendered by JS -->
          </div>
        </div>

        <!-- ==================== MESSAGES TAB ==================== -->
        <div class="admin-panel" id="tabMessages" role="tabpanel" hidden>
          <div class="admin-panel__header">
            <h2 class="admin-panel__title">Received Messages</h2>
          </div>

          <div id="messagesList" class="messages-list">
            <!-- Message items rendered by JS -->
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- ============================================================
       PROJECT EDIT MODAL
       ============================================================ -->
  <div class="modal" id="projectModal" hidden>
    <div class="modal__backdrop" id="projectModalBackdrop"></div>
    <div class="modal__content">
      <div class="modal__header">
        <h3 class="modal__title" id="modalTitle">New Project</h3>
        <button class="modal__close" id="modalClose" aria-label="Close">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
            <path d="M4 4l12 12M16 4L4 16"/>
          </svg>
        </button>
      </div>
      <form id="projectForm" novalidate>
        <input type="hidden" id="projId">
        <div class="form__field">
          <label for="projTitle" class="form__label">Project Title</label>
          <input type="text" id="projTitle" class="form__input" placeholder="e.g. Online Store" required>
          <span class="form__error" id="projTitleError"></span>
        </div>
        <div class="form__field">
          <label for="projDesc" class="form__label">Description</label>
          <textarea id="projDesc" class="form__input form__textarea" placeholder="A brief description of the project..." rows="3" required></textarea>
          <span class="form__error" id="projDescError"></span>
        </div>
        <div class="form__field">
          <label for="projTags" class="form__label">Tags (comma-separated)</label>
          <input type="text" id="projTags" class="form__input" placeholder="Website, React, Tailwind" dir="ltr">
        </div>
        <div class="form__field">
          <label for="projImage" class="form__label">Image URL</label>
          <input type="text" id="projImage" class="form__input" placeholder="https://example.com/image.png" dir="ltr">
          <span class="form__hint">Image URL or leave empty for default</span>
        </div>
        <div class="form__field">
          <label for="projLink" class="form__label">Project Link</label>
          <input type="text" id="projLink" class="form__input" placeholder="https://example.com" dir="ltr">
        </div>
        <div class="modal__actions">
          <button type="button" class="btn btn--outline" id="modalCancel">Cancel</button>
          <button type="submit" class="btn btn--primary" id="modalSave">
            <span class="btn__text">Save</span>
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- Toast notifications -->
  <div id="toastContainer" class="toast-container" aria-live="polite"></div>

  <script src="admin.js" defer></script>
</body>
</html>
